name: runner-test

on:
  workflow_dispatch:

jobs:
  test-runner:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Runner architecture: $RUNNER_ARCH"
          uname -a
          pwd
          whoami

      - name: Python test
        run: |
          python3 --version
          python3 - <<'PY'
          print("Hello from self-hosted runner")
          PY